name: NusaRPG
version: '1.0.0'
main: com.github.cahyunkk.nusarpg.NusaRPG
api-version: '1.21'
softdepend: [NusaItems, NusaMobs, NusaSkills, ItemsAdder, Oraxen]
description: Plugin RPG server — Java & Bedrock. Class/job, stats pemain, level, skill tree (tanpa config manual Bedrock; resource pack otomatis via Java config).
website: https://github.com/cahyunkk/plugin-slimefun

commands:
  nusa:
    description: RPG main command
    aliases: [rpg]
permissions:
  nusarpg.admin:
    default: op
  nusarpg.use:
    default: true
