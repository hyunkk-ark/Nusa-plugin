# Slimefun configuration
#
# Important options:
#   auto-update - Automatically check GitHub for a newer release and install it.
#   armor-update-interval - Interval for updating Slimefun armor effects.
#   enable-armor-effects - Enable or disable armor effects.
#   chat-prefix - Prefix used for Slimefun chat messages.
#   auto-save-delay-in-minutes - Data auto-save interval in minutes.
#   legacy-ore-washer - Use the legacy Ore Washer mechanics.
#   legacy-dust-washer - Use the legacy Dust Washer mechanics.
#   legacy-ore-grinder - Use the legacy Ore Grinder mechanics.
#   language - Default server language. Players may choose another language when
#              translations are enabled.
#   enable-translations - Enable per-player translations.
#   log-duplicate-block-entries - Log warnings for duplicate block entries.
#   burn-players-when-radioactive - Set exposed players on fire.
#   drop-excess-sf-give-items - Drop items given by commands when an inventory is full.
#   backup-data - Automatically back up plugin data.
#   bypass-environment-check - Skip compatibility checks. Unsupported and not recommended.
options:
  auto-update: false
  chat-prefix: '&a&lSlimefun 4 &7> '
  armor-update-interval: 10
  enable-armor-effects: true
  enable-radiation: true
  radiation-update-interval: 1
  radiation-grace-period: 15
  rainbow-armor-update-interval: 3
  auto-save-delay-in-minutes: 10
  legacy-ore-washer: false
  legacy-dust-washer: false
  legacy-ore-grinder: true
  language: en
  enable-translations: true
  log-duplicate-block-entries: true
  burn-players-when-radioactive: true
  drop-excess-sf-give-items: false
  backup-data: true
  drop-block-creative: true
  bypass-environment-check: false
  bypass-item-length-check: false
  max-gps-waypoints: 21

guide:
  # Show vanilla recipes in the Slimefun Guide.
  show-vanilla-recipes: true
  # Give new players a Slimefun Guide when they first join.
  receive-on-first-join: true
  # Include hidden item groups in search results.
  show-hidden-item-groups-in-search: false

researches:
  # Allow Creative-mode players to unlock research for free.
  free-in-creative-mode: true
  # Launch fireworks after a research unlock.
  enable-fireworks: true
  # Use Vault currency instead of experience levels for research.
  use-money-unlock: false
  # Multiplier used to convert experience costs to currency costs.
  currency-cost-convert-rate: 25.0
  # Disable the research learning animation.
  disable-learning-animation: false

URID:
  info-delay: 3000
  custom-ticker-delay: 10
  enable-tickers: true

networks:
  max-size: 200
  cargo-ticker-delay: 0
  enable-visualizer: true
  delete-excess-items: false

talismans:
  use-actionbar: true

metrics:
  auto-update: false

backpack:
  # Allow backpacks to be opened while their owner is offline.
  allow-open-when-owner-offline: true

research-ranks:
  - Chicken
  - Cow
  - Spider
  - Villager
  - Beginner
  - Clumsy Student
  - Unskilled Student
  - Incompetent Student
  - Student
  - Clumsy Apprentice
  - Apprentice
  - Skilled Apprentice
  - Upcoming Mage
  - Excellent Mage
  - Young Magician
  - Incompetent Magician
  - Common Magician
  - Magician
  - Proficient Magician
  - Skilled Magician
  - Accustomed Magician
  - Great Magician
  - Clumsy Wizard
  - Wizard
