# ═══════════════════════════════════════
#          NusaMobs — Custom Mobs Config
# ═══════════════════════════════════════
#  Drops format: "ITEM_ID MIN MAX [CHANCE]"
#    - "nusaitems:pedang_sakti 1 1 0.5"  (NusaItems item, 50% chance)
#    - "DIAMOND 1 3 1.0"                 (Vanilla item, 100% chance)
#  Equipment format: "ITEM_ID SLOT"
#    Slots: mainhand, offhand, head, chest, legs, boots
#  Skills: "skill_name args"
#    - "potion SPEED 3"   (Speed III permanently)
#    - "damage 8.0"       (Set attack damage)
#    - "armor 10.0"       (Set armor value)
#    - "speed 0.4"        (Set movement speed)
#    - "fire 9999"        (Burn forever)
#    - "invisible"        (Invisible)
#  Spawn settings — natural spawning config
#    chance: 0.02  (2% chance every 10 seconds near player)

